name: iOS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Cache Pub Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ios/Pods
            build/ios
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install Dependencies
        run: flutter pub get

      - name: Download iOS Cores
        run: dart run scripts/download_cores.dart ios

      - name: Build iOS (Beta)
        run: flutter build ios --release --no-codesign -v --build-name=beta.1.0.0 --build-number=${{ github.run_number }}

      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: mojosnap-beta-ios
          path: build/ios/iphoneos
