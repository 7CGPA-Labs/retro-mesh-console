name: iOS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS (Beta)
        run: flutter build ios --release --no-codesign -v --build-name=beta.1.0.0 --build-number=${{ github.run_number }}

      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: mojosnap-beta-ios
          path: build/ios/iphoneos
