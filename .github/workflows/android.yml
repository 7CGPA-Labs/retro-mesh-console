name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK (Beta)
        run: flutter build apk --release --build-name=beta.1.0.0 --build-number=${{ github.run_number }}

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: mojosnap-beta-android
          path: build/app/outputs/flutter-apk/app-release.apk
